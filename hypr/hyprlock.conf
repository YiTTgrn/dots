source = /home/rapha/.config/colors/colors.conf

# BACKGROUND
background {
    monitor =
    #path = screenshot
    path = /home/rapha/.config/backgrounds/nature-valley-2.jpg
    #color = $background
    blur_passes = 2
    contrast = 1
    brightness = 0.5
    vibrancy = 0.2
    vibrancy_darkness = 0.2
}

# GENERAL
general {
    no_fade_in = true
    no_fade_out = true
    hide_cursor = false
    grace = 0
    disable_loading_bar = true
}

# INPUT FIELD
input-field {
    monitor =
    size = 220, 45
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.35 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba($crustAlphaBB)
    inner_color = rgba($mantleAlphaBB)
    font_color = $text
    fade_on_empty = true
    rounding = -1
    check_color = @orange
    placeholder_text = <span foreground="##$textAlpha">Mot de passe</span>
    hide_input = false
    position = 0, -200
    halign = center
    valign = center
}

# DATE
label {
  monitor =
  text = cmd[update:1000] date +"%A %d %B %Y"
  color = $text
  font_size = 22
  font_family = JetBrains Mono
  position = 0, 300
  halign = center
  valign = center
}

# TIME
label {
  monitor = 
  text = cmd[update:1000] date +"%H:%M"
  color = $text
  font_size = 95
  font_family = JetBrains Mono Extrabold
  position = 0, 200
  halign = center
  valign = center
}

# Desktop Environment
image {
    monitor =
    path = /home/rapha/Images/hypr.png
    size = 75
    border_size = 2
    border_color = none
    position = -50, 50
    halign = right
    valign = bottom
}

