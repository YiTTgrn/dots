; https://github.com/uiriansan/SilentSDDM/wiki/Customizing

[General]
scale = 1.25
enable-animations = true
animated-background-placeholder = ""
background-fill-mode = "fill"

[LockScreen]
display = true
padding-top = 0
padding-right = 0
padding-bottom = 0
padding-left = 0
background = "nature-valley-2.jpg"
use-background-color = false
background-color = "#000000"
blur = 100
brightness = 0.0
saturation = 0.0

[LockScreen.Clock]
display = true
position = "top-center"
align = "center"
format = "hh:mm"
font-family = "RedHatDisplay"
font-size = 70
font-weight = 900
color = "#A6DA95"

[LockScreen.Date]
display = true
format = "dddd, dd MMMM, yyyy"
locale = "fr_FR"
font-family = "RedHatDisplay"
font-size = 14
font-weight = 600
color = "#CAD3F5"
margin-top = -05

[LockScreen.Message]
display = true
position = "bottom-center"
align = "center"
text = "Appuyez sur une touche"
font-family = "RedHatDisplay"
font-size = 12
font-weight = 400
display-icon = true
icon = "enter.svg"
icon-size = 16
color = "#CAD3F5"
paint-icon = true
spacing = 0

[LoginScreen]
background = "nature-valley-2.jpg"
use-background-color = false
background-color = "#1E2030"
blur = 50
brightness = 0.0
saturation = 0.0

[LoginScreen.LoginArea]
position = "center"
margin = -1

[LoginScreen.LoginArea.Avatar]
shape = "circle"
border-radius = 35
active-size = 120
inactive-size = 80
inactive-opacity = 0.05
active-border-size = 0
inactive-border-size = 0
active-border-color = "#181926"
inactive-border-color = "#181926"

[LoginScreen.LoginArea.Username]
font-family = "RedHatDisplay"
font-size = 16
font-weight = 700
color = "#CAD3F5"
margin = 10

[LoginScreen.LoginArea.PasswordInput]
width = 200
height = 30
display-icon = true
font-family = "RedHatDisplay"
font-size = 12
icon = "password.svg"
icon-size = 16
content-color = "#CAD3F5"
background-color = "#1E2030"
background-opacity = 0.85
border-size = 0
border-color = "#181926"
border-radius-left = 10
border-radius-right = 10
margin-top = 10
masked-character = "●"

[LoginScreen.LoginArea.LoginButton]
background-color = "#1E2030"
background-opacity = 0.55
active-background-color = "#1E2030"
active-background-opacity = 0.85
icon = "arrow-right.svg"
icon-size = 18
content-color = "#CAD3F5"
active-content-color = "#CAD3F5"
border-size = 0
border-color = "#CAD3F5"
border-radius-left = 10
border-radius-right = 10
margin-left = 5
show-text-if-no-password = true
hide-if-not-needed = false
font-family = "RedHatDisplay"
font-size = 12
font-weight = 600

[LoginScreen.LoginArea.Spinner]
display-text = true
text = "Connexion en cours..."
font-family = "RedHatDisplay"
font-weight = 600
font-size = 14
icon-size = 30
icon = "spinner.svg"
color = "#CAD3F5"
spacing = 5

[LoginScreen.LoginArea.WarningMessage]
font-family = "RedHatDisplay"
font-size = 11
font-weight = 400
normal-color = "#CAD3F5"
warning-color = "#EED49F"
error-color = "#ED8796"
margin-top = 10

[LoginScreen.MenuArea.Buttons]
margin-top = 50
margin-right = 50
margin-bottom = 50
margin-left = 50
size = 30
border-radius = 5
spacing = 10
font-family = "RedHatDisplay"

[LoginScreen.MenuArea.Popups]
max-height = 300
item-height = 30
item-spacing = 2
padding = 5
display-scrollbar = true
margin = 5
background-color = "#1E2030"
background-opacity = 0.05
active-option-background-color = "#1E2030"
active-option-background-opacity = 0.85
content-color = "#CAD3F5"
active-content-color = "#CAD3F5"
font-family = "RedHatDisplay"
border-size = 0
border-color = "#CAD3F5"
font-size = 11
icon-size = 16

[LoginScreen.MenuArea.Session]
display = true
position = "bottom-left"
index = 0
popup-direction = "up"
popup-align = "center"
display-session-name = true
button-width = 200
popup-width = 200
background-color = "#1E2030"
background-opacity = 0.05
active-background-opacity = 0.85
content-color = "#CAD3F5"
active-content-color = "#CAD3F5"
border-size = 0
font-size = 10
icon-size = 16

[LoginScreen.MenuArea.Layout]
display = true
position = "bottom-right"
index = 0
popup-direction = "up"
popup-align = "center"
popup-width = 180
display-layout-name = true
background-color = "#1E2030"
background-opacity = 0.05
active-background-opacity = 0.85
content-color = "#CAD3F5"
active-content-color = "#CAD3F5"
border-size = 0
font-size = 10
icon = "language.svg"
icon-size = 16

[LoginScreen.MenuArea.Keyboard]
display = true
position = "bottom-right"
index = 0
background-color = "#1E2030"
background-opacity = 0.05
active-background-opacity = 0.85
content-color = "#CAD3F5"
active-content-color = "#CAD3F5"
border-size = 0
icon = "keyboard.svg"
icon-size = 16

[LoginScreen.MenuArea.Power]
display = true
position = "bottom-right"
index = 0
popup-direction = "up"
popup-align = "center"
popup-width = 100
background-color = "#1E2030"
background-opacity = 0.05
active-background-opacity = 0.85
content-color = "#CAD3F5"
active-content-color = "#ED8796"
border-size = 0
icon = "power.svg"
icon-size = 16

[LoginScreen.VirtualKeyboard]
scale = 1.0
position = "login"
start-hidden = true
background-color = "#1E2030"
background-opacity = 0.05
key-content-color = "#CAD3F5"
key-color = "#1E2030"
key-opacity = 0.25
key-active-background-color = "#1E2030"
key-active-opacity = 0.55
selection-background-color = "#8087A2"
selection-content-color = "#CAD3F5"
primary-color = "#FFF"
border-size = 0
border-color = "#181926"

[Tooltips]
enable = true
font-family = "RedHatDisplay"
font-size = 11
content-color = "#CAD3F5"
background-color = "#1E2030"
background-opacity = 0.05
border-radius = 5
disable-user = false
disable-login-button = false
